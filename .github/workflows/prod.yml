name: Continuous Deployment (Production)

on:
  push:
    branches: ["main"]

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v2
              with:
                fetch-depth: 0

            - name: Docker Login
              uses: docker/login-action@v1
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v1

            - name: Build and Push Docker Image
              uses: docker/build-push-action@v2
              with:
                context: .
                file: ./Dockerfile
                push: true
                tags: ${{ secrets.DOCKER_USERNAME }}/bun-next-app:${{ github.sha }}
            
            - name: Clone this repo, update image tag and push changes
              env:
                PAT: ${{secrets.PAT}}
              run: |
                git clone https://github.com/niharhEAVR/argocd-deployment.git
                cd argocd-deployment

                sed -i "s|image: niharlnx/bun-next-app:.*|image: niharlnx/bun-next-app:${{ github.sha }}|g" next-app-gitops/deployment.yml

                git config user.name "GitHub Actions"
                git config user.email "github-actions[bot]@users.noreply.github.com"

                git add .
                if git diff --staged --quiet; then
                 echo "No changes detected, skipping commit"
                else
                 git commit -m "Update image tag to ${{ github.sha }}"
                 git push https://${PAT}@github.com/niharhEAVR/argocd-deployment.git main
                fi